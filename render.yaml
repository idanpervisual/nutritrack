services:
  - type: web
    name: nutritrack
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nutritrack-db
          property: connectionString

databases:
  - name: nutritrack-db
    plan: free
